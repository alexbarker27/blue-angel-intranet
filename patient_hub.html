<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Hub</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #12202f;
      --muted: #667788;
      --line: #dbe5ef;
      --accent: #3b7dd8;
      --navy: #0a2558;
      --good: #227a4f;
      --good-bg: #eef9f2;
      --warn: #b5473c;
      --warn-bg: #fff4f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 40px;
    }

    a, button { font: inherit; }

    .page-wrap {
      margin: 0 auto;
      max-width: 1180px;
    }

    .header-card,
    .hub-card,
    .patient-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .header-card {
      margin-bottom: 18px;
      padding: 24px 26px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .title {
      color: #111827;
      font-size: 31px;
      font-weight: 760;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #405264;
      font-size: 14px;
      line-height: 1.6;
      max-width: 760px;
    }

    .hub-card {
      margin-bottom: 18px;
      padding: 18px 20px;
    }

    .hub-toolbar {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
    }

    .hub-meta {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hub-filters {
      align-items: center;
      display: flex;
      gap: 8px;
    }

    .filter-button {
      background: #f7faff;
      border: 1px solid #d6e5f8;
      border-radius: 999px;
      color: #315fb7;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 12px;
    }

    .filter-button.active {
      background: #315fb7;
      border-color: #315fb7;
      color: #ffffff;
    }

    .meta-pill {
      background: #f7faff;
      border: 1px solid #d6e5f8;
      border-radius: 999px;
      color: #264a86;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 11px;
    }

    .hub-count {
      color: #425568;
      font-size: 13px;
      font-weight: 600;
      margin-left: auto;
    }

    .state-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: #425568;
      font-size: 14px;
      line-height: 1.6;
    }

    .patient-grid {
      display: grid;
      gap: 14px;
    }

    .patient-card {
      padding: 18px 20px;
    }

    .patient-row {
      align-items: center;
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr) auto;
    }

    .patient-main {
      min-width: 0;
    }

    .patient-name {
      color: #12202f;
      font-size: 18px;
      font-weight: 720;
      margin-bottom: 6px;
    }

    .patient-meta {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .patient-chip {
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 5px 9px;
      text-transform: uppercase;
    }

    .patient-chip.practice {
      background: #eef4ff;
      color: #2f61ae;
    }

    .patient-chip.status-approved {
      background: var(--good-bg);
      color: var(--good);
    }

    .patient-chip.status-pending {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .patient-destination {
      color: #425568;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      min-width: 0;
    }

    .patient-destination strong {
      color: #12202f;
      display: block;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .patient-actions {
      align-items: center;
      display: inline-flex;
      justify-content: center;
    }

    .open-button {
      align-items: center;
      background: linear-gradient(135deg, #0a2558 0%, #1f5fb8 100%);
      border: 1px solid #123a7a;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(10, 37, 88, 0.14);
      color: #ffffff;
      display: inline-flex;
      font-size: 12px;
      font-weight: 700;
      gap: 8px;
      height: 40px;
      justify-content: center;
      min-width: 98px;
      padding: 0 14px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .open-button:hover {
      box-shadow: 0 10px 22px rgba(10, 37, 88, 0.18);
      transform: translateY(-1px);
    }

    .open-button:active {
      transform: translateY(0);
    }

    .open-button-arrow {
      font-size: 13px;
      line-height: 1;
    }

    @media (max-width: 860px) {
      .patient-row {
        grid-template-columns: 1fr;
      }

      .patient-actions {
        justify-content: flex-start;
      }

      .hub-count {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="header-card">
      <div class="eyebrow">Concierge Travel Medicine</div>
      <h1 class="title">Patient Hub</h1>
      <p class="subtitle" id="hubSubtitle">Loading patients and kit links...</p>
    </div>

    <div class="hub-card">
      <div class="hub-toolbar">
        <div class="hub-filters" id="hubFilters" hidden>
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="sujansky">Sujansky</button>
          <button class="filter-button" type="button" data-filter="daniher">Daniher</button>
        </div>
        <div class="hub-meta">
          <div class="hub-count" id="hubCount">Loading...</div>
        </div>
      </div>
    </div>

    <div id="hubState" class="state-card">Loading patient list...</div>
    <div id="patientGrid" class="patient-grid" hidden></div>
  </div>

  <script src="https://justintella.github.io/sujansky-workflow/workflow-data.js"></script>
  <script src="https://justintella.github.io/daniher-travel-workflow/workflow-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const currentView = params.get("view") === "doctor" ? "doctor" : "staff";
    const practiceParam = params.get("practice") || (currentView === "staff" ? "staff" : "daniher");

    const hubSubtitle = document.getElementById("hubSubtitle");
    const hubCount = document.getElementById("hubCount");
    const hubState = document.getElementById("hubState");
    const patientGrid = document.getElementById("patientGrid");
    const hubFilters = document.getElementById("hubFilters");
    let activeFilter = "all";
    let loadedPatients = [];

    const practiceLabels = {
      staff: "All Practices",
      daniher: "Daniher",
      sujansky: "Sujansky"
    };

    function travelLocationsParam(stops) {
      const parts = (stops || [])
        .map((stop) => [stop.country, stop.city].filter(Boolean).join(", "))
        .filter(Boolean);
      return parts.join(" | ") || "Unknown destination";
    }

    function destinationLabel(stops) {
      if (!stops || !stops.length) return "Unknown destination";
      const uniqueCountries = [...new Set(stops.map((stop) => stop.country).filter(Boolean))];
      const first = [stops[0].country, stops[0].city].filter(Boolean).join(", ");
      if (uniqueCountries.length <= 1 && stops.length <= 1) return first || "Unknown destination";
      return `${first || uniqueCountries[0] || "Unknown destination"} + ${Math.max(stops.length - 1, 0)} more`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const date = new Date(dateStr + "T00:00:00");
      if (isNaN(date)) return "";
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function buildKitUrl(patient) {
      const url = new URL("travel_kit.html", window.location.href);
      url.searchParams.set("view", currentView);
      url.searchParams.set("patientId", patient.id);
      url.searchParams.set("patient", patient.name);
      url.searchParams.set("practice", patient.sourceId || practiceParam);
      url.searchParams.set("locations", travelLocationsParam(patient.stops));
      return url.toString();
    }

    function getTravelKitStorageKey() {
      return "travel-kit-workflow-records-v4";
    }

    function getTravelKitRecordKey(patient) {
      return `${patient.sourceId || practiceParam}::${patient.id}`;
    }

    function loadTravelKitRecords() {
      try {
        return JSON.parse(window.localStorage.getItem(getTravelKitStorageKey()) || "{}");
      } catch (error) {
        return {};
      }
    }

    function isTravelKitApproved(patient) {
      const records = loadTravelKitRecords();
      return !!records[getTravelKitRecordKey(patient)]?.approved;
    }

    async function loadPatients() {
      const sources = Object.values(window.__workflowDataSources || {});
      const filteredSources = currentView === "staff"
        ? sources
        : sources.filter((source) => source.id === practiceParam);

      if (!filteredSources.length) {
        throw new Error("No patient data sources are available for this view.");
      }

      const results = await Promise.allSettled(filteredSources.map((source) => source.fetchPatients()));
      const loaded = [];

      results.forEach((result, index) => {
        const source = filteredSources[index];
        if (result.status !== "fulfilled") return;
        result.value.forEach((patient) => {
          loaded.push({
            ...patient,
            sourceId: source.id,
            practice: source.label
          });
        });
      });

      return loaded.sort((left, right) => left.name.localeCompare(right.name));
    }

    function getVisiblePatients() {
      if (currentView !== "staff" || activeFilter === "all") {
        return loadedPatients;
      }
      return loadedPatients.filter((patient) => patient.sourceId === activeFilter);
    }

    function renderPatients() {
      const patients = getVisiblePatients();
      hubState.hidden = true;
      patientGrid.hidden = false;
      patientGrid.innerHTML = patients.map((patient) => {
        const approved = isTravelKitApproved(patient);
        const destination = destinationLabel(patient.stops);
        const fullLocations = travelLocationsParam(patient.stops);
        const dateText = formatDate(patient.returnDate || patient.stops?.at(-1)?.departure);
        const kitUrl = buildKitUrl(patient);

        return `
          <div class="patient-card">
            <div class="patient-row">
              <div class="patient-main">
                <div class="patient-name">${patient.name}</div>
                <div class="patient-meta">
                  <span class="patient-chip practice">${patient.practice}</span>
                  <span class="patient-chip ${approved ? "status-approved" : "status-pending"}">${approved ? "Approved" : "Not Approved"}</span>
                </div>
              </div>
              <div class="patient-destination" title="${fullLocations}">
                <strong>${destination}</strong>
                ${dateText ? `Return ${dateText}` : "Travel kit"}
              </div>
              <div class="patient-actions">
                <a class="open-button" href="${kitUrl}" target="_blank" rel="noopener noreferrer" aria-label="Open ${patient.name} kit">
                  <span>Open Kit</span>
                  <span class="open-button-arrow" aria-hidden="true">↗</span>
                </a>
              </div>
            </div>
          </div>
        `;
      }).join("");

      hubCount.textContent = `${patients.length} patients`;
    }

    async function init() {
      hubSubtitle.textContent = currentView === "staff"
        ? "All patient kits across both travel medicine practices. Click any patient to open the staff version of that kit."
        : `${practiceLabels[practiceParam] || "Practice"} patient kits. Click any patient to open the doctor version of that kit.`;

      if (currentView === "staff" && practiceParam === "staff") {
        hubFilters.hidden = false;
        hubFilters.querySelectorAll(".filter-button").forEach((button) => {
          button.addEventListener("click", () => {
            activeFilter = button.dataset.filter || "all";
            hubFilters.querySelectorAll(".filter-button").forEach((item) => {
              item.classList.toggle("active", item === button);
            });
            renderPatients();
          });
        });
      } else {
        hubFilters.remove();
      }

      try {
        loadedPatients = await loadPatients();

        if (!loadedPatients.length) {
          hubState.hidden = false;
          hubState.textContent = "No patients are available right now.";
          patientGrid.hidden = true;
          return;
        }

        renderPatients();
      } catch (error) {
        hubCount.textContent = "Unavailable";
        hubState.hidden = false;
        hubState.textContent = error?.message || "Could not load patient hub.";
        patientGrid.hidden = true;
      }
    }

    init();
  </script>
</body>
</html>
