<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Practice Terminal — Blue Angel Clinical Partners</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #0A2558;
      --blue:     #1565C0;
      --blue-lt:  #1E88E5;
      --gold:     #C9A84C;
      --gold-lt:  #E8C96A;
      --bg:       #F0F4FF;
      --white:    #FFFFFF;
      --text:     #0D1B3E;
      --muted:    #6B7A99;
      --border:   #D4E1F7;
      --green:    #16A34A;
      --green-bg: #DCFCE7;
      --amber:    #D97706;
      --amber-bg: #FEF3C7;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV (matches the other module pages) ── */
    nav {
      background: linear-gradient(135deg, #061A42 0%, #0A2558 60%, #0E3A7A 100%);
      color: white; display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px; box-shadow: 0 2px 16px rgba(10,37,88,0.28);
      position: sticky; top: 0; z-index: 1100;
    }
    .nav-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: white; }
    .nav-brand img { width: 180px; height: auto; flex-shrink: 0; display: block; filter: brightness(0) invert(1); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-practice-badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
    .nav-role-badge { background: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.35); border-radius: 20px; padding: 5px 14px; font-size: 11px; font-weight: 700; color: var(--gold-lt); text-transform: uppercase; letter-spacing: 0.08em; }
    .nav-signout { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 6px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .nav-signout:hover { background: rgba(255,255,255,0.08); color: white; }

    /* ── HERO ── */
    .hero { background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); color: white; padding: 36px 40px 44px; position: relative; overflow: hidden; }
    .hero::after { content: ''; position: absolute; right: -60px; top: -60px; width: 360px; height: 360px; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none; }
    .hero-inner { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; }
    .hero-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; margin-bottom: 14px; }
    .hero-back:hover { color: white; }
    .hero-greeting { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
    .hero-title { font-size: 30px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
    .hero-sub { font-size: 14px; color: rgba(255,255,255,0.6); }

    /* ─── TERMINAL ─── */
    main { max-width: 1000px; margin: 0 auto; padding: 28px 0 60px; }

    /* Quick access */
    .qa-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .qa-grid {
      display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 0;
    }
    .qa-card {
      display: flex; flex-direction: row; align-items: center; gap: 12px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      transition: border-color 0.15s;
    }
    .qa-card:hover { border-color: var(--blue); }
    .qa-card-top { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .qa-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .qa-text { min-width: 0; }
    .qa-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qa-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qa-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .qa-btn-tab {
      padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; text-decoration: none; border: none; white-space: nowrap;
      display: flex; align-items: center; justify-content: center;
      background: var(--navy); color: white; transition: opacity 0.15s;
    }
    .qa-btn-tab:hover { opacity: 0.85; }
    .qa-btn-embed {
      padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; border: 1.5px solid var(--border);
      background: var(--bg); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .qa-btn-embed:hover { border-color: var(--blue); color: var(--blue); }

    /* Embedded iframe */
    .wf-frame {
      width: 100%; height: 74vh; border: 1.5px solid var(--border);
      border-radius: 10px; background: white;
    }

    @media (max-width: 640px) {
      nav { padding: 0 16px; }
      .hero { padding: 26px 20px 34px; }
      main { padding: 22px 16px 40px; }
    }
    @media (max-width: 500px) { .qa-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a class="nav-brand" id="brand-link" href="dashboard.html">
    <img src="7e3352e27a31fc8d5b0aa8d5ae9036a8.webp" alt="Blue Angel Clinical Partners logo" />
  </a>
  <div class="nav-right">
    <span class="nav-practice-badge" id="nav-practice">—</span>
    <span class="nav-role-badge" id="nav-role">—</span>
    <button class="nav-signout" onclick="window.location.href='login.html'">Sign Out</button>
  </div>
</nav>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-inner">
    <a class="hero-back" id="back-link" href="dashboard.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to portal
    </a>
    <p class="hero-greeting">Practice Terminal</p>
    <h1 class="hero-title" id="hero-title">—</h1>
    <p class="hero-sub" id="hero-sub">—</p>
  </div>
</div>

<!-- ── TERMINAL BODY ── -->
<main>
  <div class="term-content" id="term-content"></div>
</main>

<script>
  /* ─── Context from URL params (login → dashboard → terminal) ─── */
  const qs = new URLSearchParams(window.location.search);
  const qsPractice = qs.get('practice') || 'sujansky';
  const qsRole     = qs.get('role')     || 'physician';
  const qsEmail    = qs.get('email')    || '';

  let currentRole     = qsRole === 'staff' ? 'staff' : 'physician';
  // Staff (e.g. Shawna) get the combined workspace across both practices;
  // a physician is scoped to their own practice only.
  let currentPractice = currentRole === 'staff' ? 'both' : qsPractice;

  const SHARED_LINKS = [
    {
      title: 'Weave', sub: 'Patient communications & fax',
      url: 'https://app.getweave.com/',
      embedUrl: 'https://app.getweave.com/',
      iconBg: '#E0F2FE', iconStroke: '#0284C7',
      iconPath: '<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>',
    },
    {
      title: 'Waitlist Tracker', sub: 'Combined patient waitlist',
      url: 'https://docs.google.com/spreadsheets/d/17hdBYeBme5X_PePvZC0FHjlGGbOVeMQwWpFmFFaMJyE/edit?gid=206672164#gid=206672164',
      embedUrl: 'https://docs.google.com/spreadsheets/d/17hdBYeBme5X_PePvZC0FHjlGGbOVeMQwWpFmFFaMJyE/htmlview',
      iconBg: '#EEF4FF', iconStroke: 'var(--blue)',
      iconPath: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>',
    },
    {
      title: 'Annual Physical Booking', sub: 'Scheduling tracker',
      url: 'https://docs.google.com/spreadsheets/d/1J2zYr_RX1x7UFFUx7IHI9Qpn8xfHc4-U/edit?gid=723593024#gid=723593024',
      embedUrl: 'https://docs.google.com/spreadsheets/d/1J2zYr_RX1x7UFFUx7IHI9Qpn8xfHc4-U/htmlview',
      iconBg: '#F0FDF4', iconStroke: '#16A34A',
      iconPath: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M12 14v4M10 16h4"/>',
    },
    {
      title: 'Inventory Tracker', sub: 'Supply & inventory tracking',
      url: 'https://docs.google.com/spreadsheets/d/1mCLoy1sO6aaA4d-3khb5Kvz-UJXKYLzU_lGtfw0bnxE/edit?gid=819440706#gid=819440706',
      embedUrl: 'https://docs.google.com/spreadsheets/d/1mCLoy1sO6aaA4d-3khb5Kvz-UJXKYLzU_lGtfw0bnxE/htmlview',
      iconBg: '#FEF9C3', iconStroke: '#CA8A04',
      iconPath: '<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
    },
    {
      title: 'Prospective Sales Guide', sub: 'Patient acquisition guide',
      url: 'https://docs.google.com/document/d/1IY1B19XMNZEdSTMnc0jHieSw3iEKhSKC/edit',
      embedUrl: 'https://docs.google.com/document/d/1IY1B19XMNZEdSTMnc0jHieSw3iEKhSKC/preview',
      iconBg: '#FDF4FF', iconStroke: '#9333EA',
      iconPath: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
    },
  ];

  const practiceData = {
    both: {
      name: 'Blue Angel Combined Staff Workspace', physician: 'Shawna Guzman',
      intakeForm: '#', intakeFormEmbed: '#',
      sharedLinks: SHARED_LINKS,
    },
    sujansky: {
      name: 'Sujansky Concierge Medicine', physician: 'Dr. Ulrike Sujansky, M.D.',
      intakeForm: 'https://docs.google.com/forms/d/1CjDjCbpK6AecdjbDdutRAC8AzS55gnCRkfhyyx1YU8I/viewform',
      intakeFormEmbed: 'https://docs.google.com/forms/d/1CjDjCbpK6AecdjbDdutRAC8AzS55gnCRkfhyyx1YU8I/viewform?embedded=true',
      sharedLinks: SHARED_LINKS,
    },
    daniher: {
      name: 'Daniher Concierge Medicine', physician: 'Dr. Amy Daniher, M.D.',
      intakeForm: 'https://forms.gle/q84xUoohi6vbAKqZA',
      intakeFormEmbed: 'https://forms.gle/q84xUoohi6vbAKqZA',
      sharedLinks: SHARED_LINKS,
    },
    other: {
      name: 'Your Practice', physician: 'Physician',
      intakeForm: '#', intakeFormEmbed: '#',
    },
  };

  const TERMINAL_LINKS = [
    {
      section: 'Travel Medicine',
      title: 'Sujansky Workflow',
      sub: 'Sujansky travel medicine workflow',
      scope: 'sujansky',
      url: 'https://justintella.github.io/sujansky-workflow/',
      embedUrl: 'https://justintella.github.io/sujansky-workflow/',
      iconBg: '#EAF4FF',
      iconStroke: 'var(--blue)',
      iconPath: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
    },
    {
      section: 'Travel Medicine',
      title: 'Staff Workflow',
      sub: 'Shared staff workflow',
      scope: 'both',
      staffOnly: true,
      url: 'https://justintella.github.io/staff-workflow/',
      embedUrl: 'https://justintella.github.io/staff-workflow/',
      iconBg: '#F0FDF4',
      iconStroke: '#16A34A',
      iconPath: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
    },
    {
      section: 'Travel Medicine',
      title: 'Daniher Workflow',
      sub: 'Daniher travel medicine workflow',
      scope: 'daniher',
      url: 'https://justintella.github.io/daniher-travel-workflow/',
      embedUrl: 'https://justintella.github.io/daniher-travel-workflow/',
      iconBg: '#FEF3C7',
      iconStroke: '#B45309',
      iconPath: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
    },
    {
      section: 'Travel Medicine',
      title: 'Sujansky Intake Form',
      sub: 'Travel medicine questionnaire',
      scope: 'sujansky',
      url: practiceData.sujansky.intakeForm,
      embedUrl: practiceData.sujansky.intakeFormEmbed,
      iconBg: '#FFF7ED',
      iconStroke: 'var(--amber)',
      iconPath: '<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><circle cx="12" cy="13" r="2"/><path d="M8 17a4 4 0 018 0"/>',
    },
    {
      section: 'Travel Medicine',
      title: 'Daniher Intake Form',
      sub: 'Travel medicine questionnaire',
      scope: 'daniher',
      url: practiceData.daniher.intakeForm,
      embedUrl: practiceData.daniher.intakeFormEmbed,
      iconBg: '#FFF7ED',
      iconStroke: 'var(--amber)',
      iconPath: '<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><circle cx="12" cy="13" r="2"/><path d="M8 17a4 4 0 018 0"/>',
    },
    {
      section: 'Travel Medicine',
      title: 'Patient Hub',
      sub: 'Travel kit hub — all patients',
      scope: 'both',
      url: 'patient_hub.html',
      embedUrl: 'patient_hub.html',
      iconBg: '#FFF1F2',
      iconStroke: '#E11D48',
      iconPath: '<path d="M3 9h18v10a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M3 9l2-4h14l2 4"/><path d="M12 13v4M10 15h4"/>',
    },
    ...SHARED_LINKS.map(link => ({ ...link, section: 'Clinic Operations', scope: 'both' })),
  ];

  /* ─── Terminal population ─── */
  function populateTerminal() {
    const pd = practiceData[currentPractice] || practiceData.other;
    const visibleLinks = TERMINAL_LINKS.filter(link => {
      if (link.staffOnly && currentRole !== 'staff') return false;
      if (currentRole === 'staff') return link.scope === 'both' || link.staffVisible;
      return link.scope === 'both' || link.scope === currentPractice;
    });
    const sections = [...new Set(visibleLinks.map(link => link.section))];

    document.getElementById('nav-practice').textContent = pd.name;
    document.getElementById('nav-role').textContent = currentRole === 'staff' ? 'Staff' : 'Physician';
    document.getElementById('hero-title').textContent = pd.name;
    document.getElementById('hero-sub').textContent = `${pd.physician} · San Mateo, CA`;

    document.getElementById('term-content').innerHTML = `
      ${sections.map(section => `
        <p class="qa-label">${section}</p>
        <div class="qa-grid" style="margin-bottom:20px">
          ${visibleLinks.filter(link => link.section === section).map(link => {
            const roleParam = currentRole === 'staff' ? 'staff' : 'doctor';
            const practiceParam = currentRole !== 'staff' ? '&practice=' + currentPractice : '';
            const needsKitContext = link.url.includes('travel_kit') || link.url.includes('patient_hub');
            const needsEmbedContext = link.embedUrl.includes('travel_kit') || link.embedUrl.includes('patient_hub');
            const resolvedUrl = needsKitContext ? link.url + '?view=' + roleParam + practiceParam : link.url;
            const resolvedEmbed = needsEmbedContext ? link.embedUrl + '?view=' + roleParam + practiceParam : link.embedUrl;
            return `
            <div class="qa-card">
              <div class="qa-card-top">
                <div class="qa-icon" style="background:${link.iconBg}">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${link.iconStroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${link.iconPath}</svg>
                </div>
                <div class="qa-text">
                  <div class="qa-title">${link.title}</div>
                  <div class="qa-sub">${link.sub}</div>
                </div>
              </div>
              <div class="qa-actions">
                <button class="qa-btn-embed" onclick="openEmbed('${resolvedEmbed}','${link.title}')">Open in Site</button>
                <a class="qa-btn-tab" href="${resolvedUrl}" target="_blank">New Tab ↗</a>
              </div>
            </div>`;
          }).join('')}
        </div>
      `).join('')}

      <div id="embed-section" style="display:none;margin-top:28px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <span id="embed-title" style="font-size:14px;font-weight:600;color:var(--text)">—</span>
          <button onclick="closeEmbed()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            Close
          </button>
        </div>
        <iframe id="wf-iframe" class="wf-frame" src="" title="Embedded view"></iframe>
      </div>
    `;
  }

  /* ─── Terminal embed ─── */
  function openEmbed(url, title) {
    const fr = document.getElementById('wf-iframe');
    fr.src = url;
    document.getElementById('embed-title').textContent = title;
    const sec = document.getElementById('embed-section');
    sec.style.display = 'block';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  function closeEmbed() {
    document.getElementById('embed-section').style.display = 'none';
    document.getElementById('wf-iframe').src = '';
  }

  /* ─── Back to dashboard (preserve context) on the logo + hero link ─── */
  const qp = new URLSearchParams({ practice: qsPractice, role: qsRole, email: qsEmail }).toString();
  document.getElementById('brand-link').href = `dashboard.html?${qp}`;
  document.getElementById('back-link').href  = `dashboard.html?${qp}`;

  populateTerminal();
</script>
</body>
</html>
